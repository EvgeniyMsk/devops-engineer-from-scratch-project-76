docker_users:
  - docker
docker_daemon_options:
  storage-driver: "overlay2"
  log-opts:
    max-size: "100m"
redmine_port: 80

redmine_db_host: localhost
redmine_db_name: redmine
redmine_db_user: redmine
redmine_db_port: 5432
redmine_db_password: "{{ vault_redmine_db_password | default('testpassword') }}"
redmine_secret_key_base: "{{ vault_redmine_secret_key_base | default('testsecretkeybase') }}"
